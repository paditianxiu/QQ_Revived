[versions]
agp = "9.2.1"
material-icons-extended = "1.7.8"
xposed-api = "102.0.0"
xposed-service = "102.0.0"
material = "1.14.0"
compose = "1.11.4"
coil = "3.5.0"
material3 = "1.5.0-alpha23"
graphics-shapes = "1.1.0"
lifecycle = "2.11.0"
activity = "1.13.0"
navigation = "2.9.8"
paging = "3.4.0-alpha04"
koin = "4.2.2"
savedstate = "1.5.0"
kotlin = "2.4.0"
miuix = "0.9.3"
zoomimage = "1.6.0-beta01"

[plugins]
agp-app = { id = "com.android.application", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }

[libraries]
libxposed-api = { group = "io.github.libxposed", name = "api", version.ref = "xposed-api" }
libxposed-service = { group = "io.github.libxposed", name = "service", version.ref = "xposed-service" }
material = { group = "com.google.android.material", name = "material", version.ref = "material" }
compose-ui = { group = "androidx.compose.ui", name = "ui", version.ref = "compose" }
compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics", version.ref = "compose" }
compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview", version.ref = "compose" }
compose-foundation = { group = "androidx.compose.foundation", name = "foundation", version.ref = "compose" }
compose-material3 = { group = "androidx.compose.material3", name = "material3", version.ref = "material3" }
activity-ktx = { group = "androidx.activity", name = "activity-ktx", version.ref = "activity" }
navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigation" }
paging-runtime = { group = "androidx.paging", name = "paging-runtime", version.ref = "paging" }
paging-compose = { group = "androidx.paging", name = "paging-compose", version.ref = "paging" }
coil-compose = { group = "io.coil-kt.coil3", name = "coil-compose", version.ref = "coil" }
coil-gif = { group = "io.coil-kt.coil3", name = "coil-gif", version.ref = "coil" }
